<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="720" viewBox="0 0 1160 720" role="img" aria-labelledby="title desc">
  <title id="title">research-paper-notes method taxonomy example</title>
  <desc id="desc">A mock Mermaid-style method taxonomy map for a topic-centered paper note library.</desc>
  <rect width="1160" height="720" rx="18" fill="#f7fafc"/>
  <rect x="32" y="32" width="1096" height="656" rx="14" fill="#ffffff" stroke="#d8e2ea"/>
  <text x="70" y="88" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" fill="#173b4a">Method Taxonomy Example</text>
  <text x="70" y="124" font-family="Inter, Arial, sans-serif" font-size="17" fill="#61727d">A Mermaid mindmap groups papers by research role instead of by reading order.</text>

  <circle cx="580" cy="360" r="86" fill="#173b4a"/>
  <text x="580" y="344" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Topic</text>
  <text x="580" y="370" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#d7e6ec">Research</text>
  <text x="580" y="394" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" fill="#d7e6ec">Map</text>

  <g stroke-linecap="round" stroke-width="6" fill="none">
    <path d="M514 310 C390 220 280 190 170 188" stroke="#2a9d8f"/>
    <path d="M506 366 C360 380 250 395 150 455" stroke="#e9c46a"/>
    <path d="M642 306 C760 208 888 186 1010 180" stroke="#e76f51"/>
    <path d="M648 418 C760 510 880 548 1018 566" stroke="#7c6ee6"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="70" y="140" width="260" height="96" rx="12" fill="#e8f6f3" stroke="#a8d8cf"/>
    <text x="200" y="172" text-anchor="middle" font-size="18" font-weight="700" fill="#1f665c">Benchmarking</text>
    <text x="200" y="202" text-anchor="middle" font-size="15" fill="#305d57">dynamic data</text>
    <text x="200" y="224" text-anchor="middle" font-size="15" fill="#305d57">domain evaluation</text>

    <rect x="70" y="422" width="270" height="110" rx="12" fill="#fff7dc" stroke="#ecd889"/>
    <text x="205" y="456" text-anchor="middle" font-size="18" font-weight="700" fill="#7a6420">Reasoning Methods</text>
    <text x="205" y="486" text-anchor="middle" font-size="15" fill="#6d5d2b">chain-of-thought</text>
    <text x="205" y="508" text-anchor="middle" font-size="15" fill="#6d5d2b">attribution</text>

    <rect x="822" y="128" width="270" height="120" rx="12" fill="#fff0ed" stroke="#efb3a8"/>
    <text x="957" y="162" text-anchor="middle" font-size="18" font-weight="700" fill="#884237">Robustness</text>
    <text x="957" y="192" text-anchor="middle" font-size="15" fill="#784a44">shortcut learning</text>
    <text x="957" y="214" text-anchor="middle" font-size="15" fill="#784a44">distribution shift</text>

    <rect x="802" y="516" width="290" height="112" rx="12" fill="#f0edff" stroke="#c3bbf4"/>
    <text x="947" y="550" text-anchor="middle" font-size="18" font-weight="700" fill="#5146a4">Agent And RAG</text>
    <text x="947" y="580" text-anchor="middle" font-size="15" fill="#55507c">tool use</text>
    <text x="947" y="602" text-anchor="middle" font-size="15" fill="#55507c">retrieval workflows</text>
  </g>

  <g font-family="Inter, Arial, sans-serif" font-size="14" fill="#263238">
    <rect x="356" y="188" width="112" height="34" rx="7" fill="#e8f6f3" stroke="#a8d8cf"/>
    <text x="412" y="211" text-anchor="middle">Paper A</text>
    <rect x="290" y="258" width="112" height="34" rx="7" fill="#e8f6f3" stroke="#a8d8cf"/>
    <text x="346" y="281" text-anchor="middle">Paper B</text>
    <rect x="280" y="520" width="112" height="34" rx="7" fill="#fff7dc" stroke="#ecd889"/>
    <text x="336" y="543" text-anchor="middle">Paper C</text>
    <rect x="720" y="242" width="112" height="34" rx="7" fill="#fff0ed" stroke="#efb3a8"/>
    <text x="776" y="265" text-anchor="middle">Paper D</text>
    <rect x="706" y="542" width="112" height="34" rx="7" fill="#f0edff" stroke="#c3bbf4"/>
    <text x="762" y="565" text-anchor="middle">Paper E</text>
  </g>

  <rect x="70" y="642" width="1020" height="34" rx="8" fill="#f4f8fa"/>
  <text x="580" y="665" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" fill="#61727d">In generated notes, this should be real Mermaid code, not a static image.</text>
</svg>
