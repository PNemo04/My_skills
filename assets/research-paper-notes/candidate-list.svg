<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" role="img" aria-labelledby="title desc">
  <title id="title">research-paper-notes candidate list example</title>
  <desc id="desc">A mock screenshot showing the candidate paper confirmation table produced before full note generation.</desc>
