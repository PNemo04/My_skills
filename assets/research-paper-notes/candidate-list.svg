  <rect x="70" y="486" width="310" height="52" rx="10" fill="#173b4a"/>
  <text x="96" y="519" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Wait for user confirmation</text>
