    <text x="150" y="261">Time-Aware Fact Checking</text>
    <text x="496" y="249">ACL 2026</text>
    <text x="662" y="249">Dynamic evidence</text>
    <text x="836" y="241">Tests whether models</text>
    <text x="836" y="261">overuse stale evidence.</text>
    <rect x="70" y="272" width="1020" height="58" fill="#fbfdfe" stroke="#d8e2ea"/>
    <text x="92" y="307">02</text>
    <text x="150" y="299">Attribution Benchmark for</text>
    <text x="150" y="319">Multimodal Fake News</text>
    <text x="496" y="307">AAAI 2025</text>
    <text x="662" y="307">Attribution</text>
    <text x="836" y="299">Moves beyond labels to</text>
    <text x="836" y="319">where the falsehood is.</text>
    <rect x="70" y="330" width="1020" height="58" fill="#ffffff" stroke="#d8e2ea"/>
    <text x="92" y="365">03</text>
    <text x="150" y="357">Tool-Augmented Agent for</text>
    <text x="150" y="377">Misinformation Detection</text>
    <text x="496" y="365">2025</text>
    <text x="662" y="365">Agent workflow</text>
    <text x="836" y="357">Frames detection as</text>
    <text x="836" y="377">tool-supported inquiry.</text>
    <rect x="70" y="388" width="1020" height="58" fill="#fbfdfe" stroke="#d8e2ea"/>
    <text x="92" y="423">04</text>
    <text x="150" y="415">Shortcut Learning in</text>
    <text x="150" y="435">Misinformation Detection</text>
    <text x="496" y="423">arXiv 2025</text>
    <text x="662" y="423">Robustness</text>
    <text x="836" y="415">Diagnoses spurious</text>
