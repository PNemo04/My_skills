  <text x="662" y="188" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#173b4a">Category</text>
  <text x="836" y="188" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#173b4a">Why Include</text>
